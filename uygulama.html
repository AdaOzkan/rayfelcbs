<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        @font-face { font-family: 'F1Black'; src: url('Formula1-Black.ttf') format('truetype'); }
        @font-face { font-family: 'F1Bold'; src: url('Formula1-Bold_web.ttf') format('truetype'); }
        @font-face { font-family: 'F1Regular'; src: url('Formula1-Regular-1.ttf') format('truetype'); }

        body { margin: 0; font-family: 'F1Regular', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }

        header {
            background: rgba(20, 41, 72, 0.95); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #3671c6; position: sticky; top: 0; z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        nav a:hover { color: #27f4d2; }

        .main-container {
            margin: 30px auto; max-width: 1200px; background: rgba(15, 15, 15, 0.9);
            border-radius: 25px; border: 1px solid #222; padding: 25px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10;
        }

        h2 { font-family: 'F1Bold', sans-serif; border-left: 5px solid #e8002d; padding-left: 15px; margin-bottom: 20px; font-size: 20px; color: #ffffff; }

        .map-wrapper { position: relative; width: 100%; height: 500px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .search-container { position: absolute; top: 15px; left: 55px; z-index: 1000; width: 220px; }
        #citySearch {
            width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid #3671c6;
            background: rgba(10, 10, 10, 0.95); color: white; font-size: 13px; outline: none; font-family: 'F1Regular', sans-serif;
        }

        .map-overlay-panel {
            position: absolute; top: 15px; right: 15px; background: rgba(10, 10, 10, 0.9);
            padding: 10px; z-index: 1000; border-radius: 12px; border: 1px solid #3671c6; display: flex; flex-direction: column; gap: 5px;
        }

        .info-box {
            position: absolute; bottom: 20px; right: 20px; padding: 18px; background: rgba(20, 41, 72, 0.98);
            border-radius: 15px; border: 2px solid #27f4d2; z-index: 1000; min-width: 250px; 
            box-shadow: 0 0 20px rgba(39, 244, 210, 0.2); transition: 0.3s;
        }
        .info-box h4 { margin: 0 0 12px 0; color: #27f4d2; font-family: 'F1Black', sans-serif; border-bottom: 1px solid #3671c6; padding-bottom: 5px; font-size: 14px; }
        .info-item { margin-bottom: 8px; font-size: 13px; color: #fff; line-height: 1.4; }
        .info-item i { color: #27f4d2; margin-right: 8px; }

        .leaflet-popup-content-wrapper { background: #142948; color: white; border: 1px solid #27f4d2; font-family: 'F1Regular', sans-serif; }
        .leaflet-popup-tip { background: #27f4d2; }
        .popup-controls { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .popup-btn { background: #27f4d2; color: black; border: none; padding: 5px; cursor: pointer; font-size: 11px; border-radius: 4px; font-family: 'F1Bold'; }

        .leaflet-control-layers { background: #142948f2 !important; border: 1px solid #3671c6 !important; color: white !important; font-family: 'F1Regular', sans-serif; }

        button { margin: 2px; padding: 8px 12px; border: 1px solid #27f4d2; border-radius: 6px; cursor: pointer; background: transparent; color: #27f4d2; font-family: 'F1Regular', sans-serif; font-size: 10px; transition: 0.3s; }
        button:hover, button.active { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }

        .custom-location-icon {
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(39, 244, 210, 0.7);
            display: flex; justify-content: center; align-items: center; background-color: #0a0a0a;
        }
        .custom-location-icon img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
        }

        .currency-section { margin-top: 40px; padding-top: 30px; border-top: 1px solid #333; margin-bottom: 100px; }
        .converter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end; }
        input, select { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-family: 'F1Regular', sans-serif; }
        select option { background: #111; color: white; }
        .calc-btn { background: #27f4d2; color: #000; font-family: 'F1Black', sans-serif; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; }
        .result-display { margin-top: 20px; padding: 20px; background: rgba(39, 244, 210, 0.05); border-radius: 12px; text-align: center; font-family: 'F1Black', sans-serif; font-size: 22px; color: #27f4d2; border: 1px dashed #27f4d2; }
        
        footer { text-align: center; padding: 40px; font-family: 'F1Black', sans-serif; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="projeler.html" style="color: #27f4d2;"><i class="fa-solid fa-layer-group"></i> Projects</a>
    </nav>
</header>

<div class="main-container">
    <h2>Gelişmiş Mahalle Analizi ve Ölçüm Aracı</h2>
    
    <div class="map-wrapper">
        <div class="search-container">
            <input type="text" id="citySearch" list="cityList" placeholder="Şehir ara..." onchange="goToCity(this.value)">
            <datalist id="cityList"></datalist>
        </div>

        <div class="map-overlay-panel">
            <button onclick="guncelle('nufus', this)">Nüfus</button>
            <button onclick="guncelle('yas', this)">Yaş</button>
            <button onclick="guncelle('medeni', this)">Medeni</button>
            <button onclick="guncelle('egitim', this)">Eğitim</button>
            <button onclick="resetMap()" class="reset-btn">Sıfırla</button>
        </div>

        <div id="infoBox" class="info-box">
            <h4 id="panelTitle">Detay Paneli</h4>
            <div id="infoContent">Analiz türü seçin veya harita üzerinde ölçüm yapın.</div>
        </div>

        <div id="map"></div>
    </div>

    <div class="currency-section">
        <h2>Global Currency Converter</h2>
        <div class="converter-grid">
            <div><label>MİKTAR</label><input type="number" id="amount" value="1"></div>
            <div><label>KAYNAK</label><select id="fromCurrency"></select></div>
            <div><label>HEDEF</label><select id="toCurrency"></select></div>
            <button class="calc-btn" onclick="convertCurrency()">HESAPLA</button>
        </div>
        <div class="result-display" id="result">HESAPLAMAK İÇİN TIKLAYIN</div>
    </div>
</div>

<footer>© 2026 ADA OZKAN • PERFORMANCE PORTFOLIO</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "color": { "value": "#27f4d2" }, "shape": { "type": "circle" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": true, "color": "#3671c6" }, "move": { "speed": 1.5 } } });

    // Katmanlar
    var light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    
    // Eş Yükselti Eğrileri (OpenTopoMap)
    var contours = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        opacity: 0.5,
        attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap (CC-BY-SA)'
    });

    var map = L.map('map', { layers: [light] }).setView([41.403, 27.355], 13);
    
    var cizilenOgeler = new L.FeatureGroup().addTo(map);
    var mahalleGrubu = new L.LayerGroup().addTo(map);
    var fayGrubu = new L.LayerGroup().addTo(map);

    L.control.layers(
        { "Sade Görünüm": light, "Uydu Görünümü": satellite }, 
        { "İzohips (Eş Yükselti)": contours, "Fay Hatları": fayGrubu, "Mahalle Analizi": mahalleGrubu, "Çizim Aracı": cizilenOgeler }, 
        { position: 'bottomleft', collapsed: false }
    ).addTo(map);

    var drawControl = new L.Control.Draw({ 
        edit: { featureGroup: cizilenOgeler }, 
        draw: { polygon: true, polyline: true, rectangle: true, circle: true, marker: true } 
    });
    map.addControl(drawControl);

    function toDMS(deg, isLat) {
        var abs = Math.abs(deg);
        var d = Math.floor(abs);
        var m = Math.floor((abs - d) * 60);
        var s = ((abs - d - m / 60) * 3600).toFixed(2);
        var dir = isLat ? (deg >= 0 ? "K" : "G") : (deg >= 0 ? "D" : "B");
        return `${d}°${m}'${s}"${dir}`;
    }

    function updatePopupContent(layer) {
        var type = layer.drawType;
        var name = layer.customName || "Yeni Ölçüm";
        var color = layer.options.color || "#27f4d2";
        var content = `<div style="min-width:180px"><b>${name}</b><br>`;

        if (type === 'marker') {
            var ll = layer.getLatLng();
            content += `<small>Ondalık: ${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}<br>DMS: ${toDMS(ll.lat, true)} ${toDMS(ll.lng, false)}</small>`;
        } else if (type === 'circle') {
            var radius = layer.getRadius();
            var area = (Math.PI * Math.pow(radius, 2) / 1000000).toFixed(4);
            content += `<small>Yarıçap: ${radius.toFixed(2)} m<br>Alan: ${area} km²</small>`;
        } else if (type === 'polygon' || type === 'rectangle') {
            var area = (L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]) / 1000000).toFixed(3);
            content += `<small>Alan: ${area} km²</small>`;
        } else if (type === 'polyline') {
            var pts = layer.getLatLngs(), d = 0;
            for (var i=0; i<pts.length-1; i++) d += pts[i].distanceTo(pts[i+1]);
            content += `<small>Mesafe: ${(d/1000).toFixed(3)} km</small>`;
        }

        content += `
            <div class="popup-controls">
                <button class="popup-btn" onclick="renameLayer(${L.stamp(layer)})">İsmi Düzenle</button>
                <div style="display:flex; align-items:center; gap:5px; font-size:10px;">
                    Renk: <input type="color" value="${color}" onchange="changeLayerColor(${L.stamp(layer)}, this.value)" style="width:20px; height:20px; border:none; background:none; cursor:pointer;">
                </div>
            </div>
        </div>`;
        
        layer.bindPopup(content);
        document.getElementById('panelTitle').innerText = name;
        document.getElementById('infoContent').innerHTML = content;
    }

    window.renameLayer = function(id) {
        var layer = cizilenOgeler.getLayer(id);
        var newName = prompt("Yeni bir isim girin:", layer.customName || "");
        if (newName) { layer.customName = newName; updatePopupContent(layer); layer.openPopup(); }
    };

    window.changeLayerColor = function(id, newColor) {
        var layer = cizilenOgeler.getLayer(id);
        if (layer.setStyle) layer.setStyle({ color: newColor, fillColor: newColor });
        layer.options.color = newColor; updatePopupContent(layer);
    };

    map.on(L.Draw.Event.CREATED, function (e) {
        var layer = e.layer;
        layer.drawType = e.layerType;
        layer.customName = "Yeni Ölçüm";
        if (layer.setStyle) { layer.setStyle({ color: '#27f4d2', fillColor: '#27f4d2', weight: 3, fillOpacity: 0.4 }); }
        cizilenOgeler.addLayer(layer);
        updatePopupContent(layer);
    });

    const iller = {"Adana":[37,35.32],"Adıyaman":[37.76,38.27],"Afyon":[38.75,30.55],"Ağrı":[39.71,43.05],"Amasya":[40.64,35.83],"Ankara":[39.93,32.85],"Antalya":[36.88,30.7],"Artvin":[41.18,41.81],"Aydın":[37.84,27.84],"Balıkesir":[39.64,27.88],"Bilecik":[40.14,29.97],"Bingöl":[38.88,40.49],"Bitlis":[38.4,42.1],"Bolu":[40.73,31.6],"Burdur":[37.72,30.29],"Bursa":[40.18,29.06],"Çanakkale":[40.15,26.41],"Çankırı":[40.6,33.61],"Çorum":[40.55,34.95],"Denizli":[37.77,29.08],"Diyarbakır":[37.91,40.23],"Edirne":[41.68,26.56],"Elazığ":[38.68,39.22],"Erzincan":[39.75,39.5],"Erzurum":[39.9,41.26],"Eskişehir":[39.77,30.52],"Gaziantep":[37.06,37.38],"Giresun":[40.91,38.38],"Gümüşhane":[40.46,39.48],"Hakkari":[37.57,43.74],"Hatay":[36.2,36.16],"Isparta":[37.76,30.55],"Mersin":[36.81,34.64],"İstanbul":[41,28.97],"İzmir":[38.42,27.14],"Kars":[40.6,43.09],"Kastamonu":[41.38,33.77],"Kayseri":[38.72,35.48],"Kırklareli":[41.73,27.21],"Kırşehir":[39.14,34.17],"Kocaeli":[40.85,29.88],"Konya":[37.87,32.49],"Kütahya":[39.41,29.98],"Malatya":[38.35,38.3],"Manisa":[38.61,27.42],"Kahramanmaraş":[37.58,36.93],"Mardin":[37.31,40.73],"Muğla":[37.21,28.36],"Muş":[38.74,41.5],"Nevşehir":[38.62,34.71],"Niğde":[37.96,34.68],"Ordu":[40.98,37.87],"Rize":[41.02,40.52],"Sakarya":[40.75,30.37],"Samsun":[41.28,36.33],"Siirt":[37.92,41.94],"Sinop":[42.02,35.15],"Sivas":[39.74,37.01],"Tekirdağ":[40.98,27.51],"Tokat":[40.31,36.55],"Trabzon":[41,39.71],"Tunceli":[39.1,39.54],"Şanlıurfa":[37.15,38.79],"Uşak":[38.68,29.4],"Van":[38.48,43.38],"Yozgat":[39.81,34.81],"Zonguldak":[41.45,31.79],"Aksaray":[38.36,34.03],"Bayburt":[40.25,40.22],"Karaman":[37.17,33.22],"Kırıkkale":[39.84,33.51],"Batman":[37.88,41.13],"Şırnak":[37.51,42.46],"Bartın":[41.63,32.33],"Ardahan":[41.11,42.7],"Iğdır":[39.91,44.03],"Yalova":[40.65,29.27],"Karabük":[41.2,32.62],"Kilis":[36.71,37.12],"Osmaniye":[37.07,36.24],"Düzce":[40.84,31.15]};
    const dl = document.getElementById('cityList');
    Object.keys(iller).sort().forEach(il => { let opt = document.createElement('option'); opt.value = il; dl.appendChild(opt); });
    function goToCity(val) { if(iller[val]) map.flyTo(iller[val], 11); }

    const mahalleler = [{name:"Sevgi", lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Bekar", egitim:"Lisans"},{name:"8 Kasım", lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"},{name:"Hürriyet", lat:41.4031, lon:27.3424, nufus:7300, yas:"65+", medeni:"Evli", egitim:"Lise"},{name:"Yılmaz", lat:41.4120, lon:27.3508, nufus:3200, yas:"40-44", medeni:"Evli", egitim:"Lise"},{name:"Dere", lat:41.4090, lon:27.3321, nufus:1800, yas:"65+", medeni:"Evli", egitim:"Lise"},{name:"Gençlik", lat:41.3981, lon:27.3491, nufus:6400, yas:"20-24", medeni:"Evli", egitim:"Lise"},{name:"Kurtuluş", lat:41.3989, lon:27.3565, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},{name:"Siteler", lat:41.3966, lon:27.3570, nufus:7600, yas:"30-34", medeni:"Evli", egitim:"Lise"},{name:"Yıldız", lat:41.3982, lon:27.3659, nufus:8000, yas:"40-44", medeni:"Evli", egitim:"Lise"},{name:"İnönü", lat:41.4019, lon:27.3600, nufus:6000, yas:"65+", medeni:"Evli", egitim:"Lise"},{name:"Kocasinan", lat:41.4068, lon:27.3453, nufus:6200, yas:"65+", medeni:"Evli", egitim:"Lise"},{name:"Gündoğu", lat:41.4082, lon:27.3630, nufus:6700, yas:"65+", medeni:"Bekar", egitim:"İlkokul"},{name:"Atatürk", lat:41.4033, lon:27.3697, nufus:9700, yas:"40-44", medeni:"Evli", egitim:"Lise"},{name:"Güneş", lat:41.4058, lon:27.3698, nufus:5900, yas:"65+", medeni:"Evli", egitim:"İlkokul"},{name:"Cumhuriyet", lat:41.4139, lon:27.3592, nufus:3600, yas:"65+", medeni:"Evli", egitim:"Lise"},{name:"Barış", lat:41.4116, lon:27.3598, nufus:4100, yas:"65+", medeni:"Evli", egitim:"İlkokul"}];

    var aktifKategori = "";
    var katmanlar = [];
    mahalleler.forEach(m => {
        var marker = L.circleMarker([m.lat, m.lon], { radius: 10, fillColor: "#ccc", color: "#fff", weight: 2, fillOpacity: 0.8 }).addTo(mahalleGrubu);
        marker.veri = m;
        marker.on("click", function() {
            if(!aktifKategori) { document.getElementById('infoContent').innerHTML = "Önce bir kategori seçin."; return; }
            let label = aktifKategori.charAt(0).toUpperCase() + aktifKategori.slice(1);
            let icon = aktifKategori === "nufus" ? "users" : aktifKategori === "egitim" ? "graduation-cap" : aktifKategori === "yas" ? "calendar-days" : "heart";
            document.getElementById('panelTitle').innerText = label + " Analizi";
            document.getElementById('infoContent').innerHTML = `<div class="info-item"><b>${m.name} Mah.</b></div><div class="info-item"><i class="fa-solid fa-${icon}"></i> ${label}: ${m[aktifKategori]}</div>`;
        });
        katmanlar.push(marker);
    });

    function guncelle(tip, btn) {
        aktifKategori = tip;
        document.querySelectorAll('.map-overlay-panel button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panelTitle').innerText = btn.innerText + " Analizi";
        katmanlar.forEach(k => {
            let v = k.veri[tip], r = "#ccc";
            if(tip==='nufus') { r = v > 10000 ? '#08306b' : v > 8000 ? '#08519c' : v > 6000 ? '#2171b5' : v > 4000 ? '#4292c6' : v > 2000 ? '#6baed6' : '#9ecae1'; }
            else if(tip==='egitim') r = v==="Lisans" ? '#27f4d2' : v==="Lise" ? '#3671c6' : '#e8002d';
            else if(tip==='yas') r = v==="65+" ? '#8e44ad' : v==="40-44" ? '#e67e22' : '#27f4d2';
            else if(tip==='medeni') r = v==="Evli" ? '#3498db' : '#f1c40f';
            k.setStyle({ fillColor: r });
        });
    }

    function resetMap() { aktifKategori = ""; map.setView([41.403, 27.355], 13); cizilenOgeler.clearLayers(); katmanlar.forEach(k=>k.setStyle({fillColor:"#ccc"})); document.getElementById('panelTitle').innerText = "Detay Paneli"; document.getElementById('infoContent').innerHTML = "Analiz türü seçin."; }

    async function convertCurrency() {
        const amt = document.getElementById('amount').value, res = document.getElementById('result');
        res.innerText = "Simülasyon: Döviz verisi alınamadı.";
    }
    const fromCur = document.getElementById('fromCurrency'), toCur = document.getElementById('toCurrency');
    const codes = ["USD", "EUR", "TRY", "GBP"];
    codes.forEach(c => { fromCur.add(new Option(c, c, c === "TRY")); toCur.add(new Option(c, c, c === "USD")); });

    function createCustomIcon(imgFile, color) {
        return L.divIcon({
            className: 'custom-location-icon',
            html: `<img src="${imgFile}" style="border: 4px solid ${color};">`,
            iconSize: [80, 80], iconAnchor: [40, 40], popupAnchor: [0, -40]
        });
    }

    const ozelNoktalar = [
        { name: "Uras'ın Evi", coords: [41.394079, 27.370980], color: "#33FF57", img: "uras.jpeg" },
        { name: "Sarp'ın Evi", coords: [41.429581, 27.101126], color: "#FF5733", img: "sarp.jpeg" },
        { name: "Ada'nın Evi", coords: [40.888178, 26.896884], color: "#F333FF", img: "ada.jpg" },
        { name: "Zile", coords: [40.301905, 35.886380], color: "#FF3333", img: "zile.jpeg" },
        { name: "Yusufun Evi", coords: [41.398083, 27.350222], color: "#FFD700", img: "yusuf.jpeg" },
        { name: "Edirne", coords: [41.677065, 26.555878], color: "#ADFF2F", img: "edirne.jpeg" },
        { name: "Mamak", coords: [39.912075, 32.920025], color: "#00FFFF", img: "ada.jpeg" },
        { name: "Çatalca", coords: [41.142002, 28.454694], color: "#3357FF", img: null }
    ];

    ozelNoktalar.forEach(n => {
        var marker;
        if (n.img) { marker = L.marker(n.coords, { icon: createCustomIcon(n.img, n.color) }).addTo(map); }
        else { marker = L.circleMarker(n.coords, { radius: 12, fillColor: n.color, color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map); }
        marker.bindPopup(`<b>${n.name}</b>`);
    });

    // --- GELİŞMİŞ FAY HATTI SİSTEMİ ---
    const fayVerisi = {
        "type": "FeatureCollection",
        "features": [
            // Kuzey Anadolu Fay Hattı (KAF) - Ana Segment
            { "type": "Feature", "properties": { "name": "Kuzey Anadolu Fay Hattı (KAF) - Ana Aktif Hat", "risk": "Kritik", "color": "#e8002d" }, "geometry": { "type": "LineString", "coordinates": [[26.4, 40.5], [27.8, 40.65], [29.5, 40.75], [31.0, 40.85], [33.5, 41.05], [35.5, 40.8], [37.5, 40.2], [40.0, 39.7], [42.5, 39.3], [44.8, 39.1]] } },
            // Doğu Anadolu Fay Hattı (DAF)
            { "type": "Feature", "properties": { "name": "Doğu Anadolu Fay Hattı (DAF)", "risk": "Yüksek", "color": "#e8002d" }, "geometry": { "type": "LineString", "coordinates": [[35.8, 36.4], [37.0, 37.2], [38.2, 38.1], [39.8, 39.2], [41.5, 39.6], [43.0, 39.4]] } },
            // Ege Graben Sistemleri (BAF)
            { "type": "Feature", "properties": { "name": "Gediz Grabeni Fay Sistemi", "risk": "Orta-Yüksek", "color": "#ff8c00" }, "geometry": { "type": "LineString", "coordinates": [[26.8, 38.6], [28.2, 38.4], [29.5, 38.2]] } },
            { "type": "Feature", "properties": { "name": "Menderes Grabeni Fay Sistemi", "risk": "Orta-Yüksek", "color": "#ff8c00" }, "geometry": { "type": "LineString", "coordinates": [[27.1, 37.9], [28.5, 37.8], [30.1, 37.7]] } },
            // Ölü Deniz Çatlağı Uzantısı
            { "type": "Feature", "properties": { "name": "Ölü Deniz Fay Hattı Uzantısı", "risk": "Yüksek", "color": "#ffd700" }, "geometry": { "type": "LineString", "coordinates": [[36.2, 35.8], [36.5, 36.5], [36.8, 37.0]] } }
        ]
    };

    L.geoJSON(fayVerisi, {
        style: function(feature) {
            return {
                color: feature.properties.color,
                weight: feature.properties.risk === "Kritik" ? 5 : 3,
                opacity: 0.9,
                dashArray: feature.properties.risk === "Kritik" ? null : "8, 8"
            };
        },
        onEachFeature: function (feature, layer) {
            layer.bindPopup(`
                <div style="font-family: 'F1Bold'; color: ${feature.properties.color};">
                    <i class="fa-solid fa-triangle-exclamation"></i> ${feature.properties.name}<br>
                    <span style="color: white; font-size: 11px;">Risk Seviyesi: ${feature.properties.risk}</span>
                </div>
            `);
        }
    }).addTo(fayGrubu);

</script>
</body>
