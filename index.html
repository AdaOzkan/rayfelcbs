<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Projeler | Ada Özkan</title> <link rel="icon" type="image/x-icon" href="adalogo.ico"> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"> <style>
        /* Formula 1 yazı tiplerini sisteme tanımlama */
        @font-face { font-family: 'F1Black'; src: url('Formula1-Black.ttf') format('truetype'); }
        @font-face { font-family: 'F1Bold'; src: url('Formula1-Bold_web.ttf') format('truetype'); }
        @font-face { font-family: 'F1Regular'; src: url('Formula1-Regular-1.ttf') format('truetype'); }

        /* Genel sayfa tasarımı: Kaydırmayı engelle ve siyah tema yap */
        body { margin: 0; padding: 0; font-family: 'F1Regular', sans-serif; background: #0a0a0a; color: white; height: 100vh; overflow: hidden; }
        
        /* Arka plandaki teknolojik noktacıkların (partikül) alanı */
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; top: 0; left: 0; pointer-events: none; }

        /* Harita kapsayıcısı ve harita boyutu */
        .map-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #map { width: 100%; height: 100%; background: #0a0a0a; }

        /* Şehir arama kutusunun tasarımı */
        .search-container { position: absolute; top: 20px; left: 60px; z-index: 1000; width: 220px; }
        #citySearch {
            width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid #3671c6;
            background: rgba(10, 10, 10, 0.95); color: white; font-size: 13px; outline: none; font-family: 'F1Regular', sans-serif;
        }

        /* Sağ üstteki buton panelinin (Analiz butonları) tasarımı */
        .map-overlay-panel {
            position: absolute; top: 20px; right: 20px; background: rgba(10, 10, 10, 0.9);
            padding: 10px; z-index: 1000; border-radius: 12px; border: 1px solid #3671c6; display: flex; flex-direction: column; gap: 5px;
        }

        /* Sağ alttaki detay bilgi kutusunun tasarımı */
        .info-box {
            position: absolute; bottom: 30px; right: 20px; padding: 18px; background: rgba(20, 41, 72, 0.98);
            border-radius: 15px; border: 2px solid #27f4d2; z-index: 1000; min-width: 250px; 
            box-shadow: 0 0 20px rgba(39, 244, 210, 0.2); transition: 0.3s;
        }

        /* Bilgi kutusu içindeki başlık ve metin stilleri */
        .info-box h4 { margin: 0 0 12px 0; color: #27f4d2; font-family: 'F1Black', sans-serif; border-bottom: 1px solid #3671c6; padding-bottom: 5px; font-size: 14px; }
        .info-item { margin-bottom: 8px; font-size: 13px; color: #fff; line-height: 1.4; }
        .info-item i { color: #27f4d2; margin-right: 8px; }

        /* Harita üzerindeki açılır pencerelerin (popup) tasarımı */
        .leaflet-popup-content-wrapper { background: #142948; color: white; border: 1px solid #27f4d2; font-family: 'F1Regular', sans-serif; }
        .leaflet-popup-tip { background: #27f4d2; }
        .popup-controls { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .popup-btn { background: #27f4d2; color: black; border: none; padding: 5px; cursor: pointer; font-size: 11px; border-radius: 4px; font-family: 'F1Bold'; width: 100%; }

        /* Panel butonlarının genel stili ve hover (üzerine gelme) efekti */
        button { margin: 2px; padding: 8px 12px; border: 1px solid #27f4d2; border-radius: 6px; cursor: pointer; background: transparent; color: #27f4d2; font-family: 'F1Regular', sans-serif; font-size: 10px; transition: 0.3s; }
        button:hover, button.active { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; } /* Sıfırla butonu kırmızı */

        /* Özel profil resimli ikonun yuvarlak ve parlayan stili */
        .custom-location-icon { border-radius: 50%; overflow: hidden; box-shadow: 0 0 15px rgba(39, 244, 210, 0.7); display: flex; justify-content: center; align-items: center; background-color: #0a0a0a; }
        .custom-location-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        /* Sayfa altındaki imza yazısı */
        footer { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; font-family: 'F1Black', sans-serif; font-size: 10px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

<div id="particles-js"></div> <div class="map-wrapper">
    <div id="map"></div> <div class="search-container">
        <input type="text" id="citySearch" list="cityList" placeholder="Şehir ara..." onchange="goToCity(this.value)">
        <datalist id="cityList"></datalist>
    </div>

    <div class="map-overlay-panel">
        <button onclick="guncelle('nufus', this)">Nüfus</button>
        <button onclick="guncelle('yas', this)">Yaş</button>
        <button onclick="guncelle('medeni', this)">Medeni</button>
        <button onclick="guncelle('egitim', this)">Eğitim</button>
        <button onclick="resetMap()" class="reset-btn">Sıfırla</button>
    </div>

    <div id="infoBox" class="info-box">
        <h4 id="panelTitle">Detay Paneli</h4>
        <div id="infoContent">Analiz türü seçin veya harita üzerinde ölçüm yapın.</div>
    </div>
</div>

<footer>© 2026 ADA OZKAN • PERFORMANCE PORTFOLIO</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script> <script>
    // Partikül animasyonunu başlatma ve renk ayarları
    particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": "#27f4d2" }, "opacity": { "value": 0.2 }, "line_linked": { "enable": true, "color": "#3671c6" } } });

    // Farklı harita taban katmanlarını (Sade, Uydu, İzohips) tanımlama
    var light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    var contours = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { opacity: 0.4 });

    // Haritayı başlatma ve varsayılan merkezi (Lüleburgaz civarı) ayarlama
    var map = L.map('map', { layers: [light], zoomControl: false }).setView([41.403, 27.355], 13);
    L.control.zoom({ position: 'bottomleft' }).addTo(map); // Yakınlaşma butonlarını sol alta al
    
    // Harita üzerindeki farklı veri grupları için katman konteynırları
    var cizilenOgeler = new L.FeatureGroup().addTo(map); // Kullanıcının çizdikleri
    var mahalleGrubu = new L.LayerGroup().addTo(map); // Mahalle noktaları
    var fayGrubu = new L.LayerGroup().addTo(map); // Fay hattı çizgileri

    // Katman kontrol menüsünü sol alta ekleme
    L.control.layers(
        { "Sade": light, "Uydu": satellite }, 
        { "İzohips": contours, "Faylar": fayGrubu, "Mahalleler": mahalleGrubu, "Çizimler": cizilenOgeler }, 
        { position: 'bottomleft', collapsed: false }
    ).addTo(map);

    // Çizim araçlarını (sol taraf) aktif etme
    var drawControl = new L.Control.Draw({ 
        edit: { featureGroup: cizilenOgeler }, 
        draw: { polygon: true, polyline: true, rectangle: true, circle: true, marker: true } 
    });
    map.addControl(drawControl);

    // Bir şekil çizildiğinde veya tıklandığında popup içeriğini güncelleyen fonksiyon
    function updatePopupContent(layer) {
        var type = layer.drawType, name = layer.customName || "Yeni Ölçüm", color = layer.options.color || "#27f4d2";
        var content = `<div style="min-width:180px"><b>${name}</b><br>`;
        
        // Şeklin tipine göre matematiksel hesaplamalar yapma
        if (type === 'marker') { // Eğer sadece işaretçiyse koordinat ver
            var ll = layer.getLatLng();
            content += `<small>Konum: ${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}</small>`;
        } else if (type === 'circle') { // Daire ise alanını (pi * r^2) hesapla
            content += `<small>Alan: ${(Math.PI * Math.pow(layer.getRadius(), 2) / 1000000).toFixed(4)} km²</small>`;
        } else if (type === 'polygon' || type === 'rectangle') { // Çokgense yüzölçümü hesapla
            content += `<small>Alan: ${(L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]) / 1000000).toFixed(3)} km²</small>`;
        } else if (type === 'polyline') { // Çizgiyse mesafe hesapla
            var pts = layer.getLatLngs(), d = 0;
            for (var i=0; i<pts.length-1; i++) d += pts[i].distanceTo(pts[i+1]);
            content += `<small>Mesafe: ${(d/1000).toFixed(3)} km</small>`;
        }

        // Popup içine isim düzenleme ve renk değiştirme butonları ekle
        content += `
            <div class="popup-controls">
                <button class="popup-btn" onclick="renameLayer(${L.stamp(layer)})">İsmi Düzenle</button>
                <div style="display:flex; align-items:center; gap:10px; font-size:11px; margin-top:5px;">
                    Renk Değiştir: <input type="color" value="${color}" onchange="changeLayerColor(${L.stamp(layer)}, this.value)" style="width:30px; height:20px; border:none; cursor:pointer; background:none;">
                </div>
            </div>
        </div>`;
        
        layer.bindPopup(content); // Bilgiyi haritadaki şekle bağla
        document.getElementById('panelTitle').innerText = name; // Sağ alt paneli güncelle
        document.getElementById('infoContent').innerHTML = content;
    }

    // Çizilen şeklin ismini değiştiren fonksiyon
    window.renameLayer = function(id) {
        var layer = cizilenOgeler.getLayer(id);
        var newName = prompt("İsim:", layer.customName || "");
        if (newName) { layer.customName = newName; updatePopupContent(layer); layer.openPopup(); }
    };

    // Çizilen şeklin rengini değiştiren fonksiyon
    window.changeLayerColor = function(id, newColor) {
        var layer = cizilenOgeler.getLayer(id);
        if (layer.setStyle) layer.setStyle({ color: newColor, fillColor: newColor });
        layer.options.color = newColor; 
        updatePopupContent(layer);
    };

    // Yeni bir çizim tamamlandığında çalışan olay
    map.on(L.Draw.Event.CREATED, function (e) {
        var layer = e.layer;
        layer.drawType = e.layerType;
        layer.customName = "Yeni Ölçüm";
        if (layer.setStyle) layer.setStyle({ color: '#27f4d2', fillColor: '#27f4d2', weight: 3, fillOpacity: 0.4 });
        cizilenOgeler.addLayer(layer);
        updatePopupContent(layer);
    });

    // Türkiye illeri koordinat verisi (Arama motoru için)
    const iller = {"Adana":[37,35.32],"Adıyaman":[37.76,38.27], /* ... diğer iller ... */ "Düzce":[40.84,31.15]};
    const dl = document.getElementById('cityList');
    // İlleri alfabetik dizip arama listesine (datalist) ekleme
    Object.keys(iller).sort().forEach(il => { let opt = document.createElement('option'); opt.value = il; dl.appendChild(opt); });
    // Seçilen ile haritayı uçurma (flyTo)
    function goToCity(val) { if(iller[val]) map.flyTo(iller[val], 11); }

    // Mahalle bazlı analiz verileri (Örnek CBS verisi)
    const mahalleler = [{name:"Sevgi", lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Bekar", egitim:"Lisans"},{name:"8 Kasım", lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"}, /* ... diğer mahalleler ... */ ];

    var aktifKategori = "", katmanlar = [];
    // Her mahalle için haritaya birer daire işaretçisi koyma
    mahalleler.forEach(m => {
        var marker = L.circleMarker([m.lat, m.lon], { radius: 10, fillColor: "#ccc", color: "#fff", weight: 2, fillOpacity: 0.8 }).addTo(mahalleGrubu);
        marker.veri = m; // Veriyi işaretçinin içine sakla
        marker.on("click", function() { // Tıklandığında bilgileri panelde göster
            if(!aktifKategori) return;
            document.getElementById('panelTitle').innerText = aktifKategori.toUpperCase() + " Verisi";
            document.getElementById('infoContent').innerHTML = `<b>${m.name} Mah.</b><br>${aktifKategori}: ${m[aktifKategori]}`;
        });
        katmanlar.push(marker);
    });

    // Renk analizi yapan ana fonksiyon (Nüfus, Yaş vb. butonlara basınca çalışır)
    function guncelle(tip, btn) {
        aktifKategori = tip;
        document.querySelectorAll('.map-overlay-panel button').forEach(b => b.classList.remove('active')); // Buton stilini güncelle
        btn.classList.add('active');
        katmanlar.forEach(k => {
            let v = k.veri[tip], r = "#ccc"; // Varsayılan renk gri
            // Verinin değerine göre renk ataması yap (Koyu mavi = yüksek nüfus vb.)
            if(tip==='nufus') r = v > 8000 ? '#08306b' : v > 4000 ? '#4292c6' : '#9ecae1';
            else if(tip==='egitim') r = v==="Lisans" ? '#27f4d2' : v==="Lise" ? '#3671c6' : '#e8002d';
            else if(tip==='yas') r = v==="65+" ? '#e8002d' : v==="40-44" ? '#ffa500' : '#27f4d2';
            else if(tip==='medeni') r = v==="Evli" ? '#3671c6' : '#f427d2';
            k.setStyle({ fillColor: r }); // Haritadaki noktanın rengini değiştir
        });
    }

    // Haritayı ilk konumuna döndürür ve çizimleri siler
    function resetMap() { map.setView([41.403, 27.355], 13); cizilenOgeler.clearLayers(); }

    // GeoJSON formatında Türkiye fay hatları verisi
    const detayliFaylar = {
        "type": "FeatureCollection",
        "features": [
            { "type": "Feature", "properties": { "name": "Kuzey Anadolu Fay Hattı (KAF)", "risk": "Kritik", "color": "#ff0000" }, "geometry": { "type": "LineString", "coordinates": [[26.1, 40.4], [26.8, 40.5], [27.5, 40.6], [28.5, 40.7], [29.5, 40.8], [30.5, 40.8], [31.5, 40.9], [32.5, 41.0], [33.8, 41.0], [35.2, 40.8], [36.5, 40.4], [37.5, 40.2], [38.8, 39.9], [40.0, 39.7], [41.2, 39.5], [42.5, 39.3], [43.8, 39.1], [44.9, 39.0]] } },
            /* ... diğer faylar ... */
        ]
    };

    // Fay hatlarını haritaya çizgisel olarak ekleme ve popup bağlama
    L.geoJSON(detayliFaylar, {
        style: (f) => ({ color: f.properties.color, weight: 4, opacity: 0.8 }),
        onEachFeature: (f, l) => { l.bindPopup(`<b>${f.properties.name}</b><br>Risk Durumu: ${f.properties.risk}`); }
    }).addTo(fayGrubu);

    // Profil resimli özel işaretçi (icon) oluşturma fonksiyonu
    function createCustomIcon(img, col) { return L.divIcon({ className: 'custom-location-icon', html: `<img src="${img}" style="border: 3px solid ${col};">`, iconSize: [60, 60] }); }
    // Haritaya özel bir nokta (Ada'nın Evi) ekleme
    const ozel = [{ name: "Ada'nın Evi", coords: [40.888178, 26.896884], col: "#F333FF", img: "ada.jpg" }];
    ozel.forEach(n => { L.marker(n.coords, { icon: createCustomIcon(n.img, n.col) }).addTo(map).bindPopup(n.name); });

</script>
</body>
</html>
